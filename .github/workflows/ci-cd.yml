name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
      - claude/meeting-room-booking-BA5YJ
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
      - claude/meeting-room-booking-BA5YJ
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        type: boolean
        default: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build backend
        working-directory: ./backend
        run: npm run build

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: /api
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: open-meeting:${{ steps.version.outputs.VERSION }}
          outputs: type=docker,dest=/tmp/open-meeting.tar

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to GHCR
        run: |
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          docker load < /tmp/open-meeting.tar
          docker tag open-meeting:${{ steps.version.outputs.VERSION }} ghcr.io/${OWNER}/open-meeting:${{ steps.version.outputs.VERSION }}
          docker tag open-meeting:${{ steps.version.outputs.VERSION }} ghcr.io/${OWNER}/open-meeting:latest
          docker push ghcr.io/${OWNER}/open-meeting:${{ steps.version.outputs.VERSION }}
          docker push ghcr.io/${OWNER}/open-meeting:latest

      - name: Compress Docker image
        run: gzip /tmp/open-meeting.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: docker-image
          path: /tmp/open-meeting.tar.gz
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: docker-build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create and push tag (manual trigger only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.VERSION }}
          git push origin ${{ steps.version.outputs.VERSION }}

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Rename image file with version
        run: mv /tmp/open-meeting.tar.gz /tmp/open-meeting-${{ steps.version.outputs.VERSION }}.tar.gz

      - name: Generate changelog
        id: changelog
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            echo "## Changes since $PREV_TAG" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $PREV_TAG..HEAD >> CHANGELOG.md
          else
            echo "## Initial Release" > CHANGELOG.md
            git log --pretty=format:"- %s (%h)" >> CHANGELOG.md
          fi

          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Docker Image" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Option 1 — Pull from registry (recommended)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo '```bash' >> CHANGELOG.md
          echo "docker run -d -p 80:80 \\" >> CHANGELOG.md
          echo "  -e JWT_SECRET=change-me-to-a-long-random-string \\" >> CHANGELOG.md
          echo "  -e ENCRYPTION_KEY=change-me-to-a-32-char-secret-key \\" >> CHANGELOG.md
          echo "  -v ./data:/app/backend/data \\" >> CHANGELOG.md
          echo "  --name open-meeting --restart unless-stopped \\" >> CHANGELOG.md
          echo "  ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/open-meeting:latest" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### Option 2 — Offline install (tar.gz)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "Download \`open-meeting-${VERSION}.tar.gz\` from the assets below." >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo '```bash' >> CHANGELOG.md
          echo "gunzip -c open-meeting-${VERSION}.tar.gz | docker load" >> CHANGELOG.md
          echo "docker run -d -p 80:80 --name open-meeting open-meeting:${VERSION}" >> CHANGELOG.md
          echo '```' >> CHANGELOG.md

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' || contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          generate_release_notes: true
          files: /tmp/open-meeting-${{ steps.version.outputs.VERSION }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
